# Supabase PostgreSQL connection
# Get these from: Supabase Dashboard -> Project Settings -> Database
spring.datasource.url=jdbc:postgresql://YOUR_HOST.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

# Google OAuth2
google.client-id=738935020436-sgdhfi5a07bln2es3t5uron0harvj9hr.apps.googleusercontent.com